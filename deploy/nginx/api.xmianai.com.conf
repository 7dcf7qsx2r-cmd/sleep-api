# api.xmianai.com → sleep-api (127.0.0.1:8787)
# 安装: scripts/ci/setup-nginx-https.sh
# 证书: 从 UAT 复制或 certbot --nginx -d api.xmianai.com

upstream sleep_api {
    server 127.0.0.1:8787;
    keepalive 32;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.xmianai.com;

    ssl_certificate /etc/letsencrypt/live/xmianai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xmianai.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://sleep_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.xmianai.com;
    return 301 https://$host$request_uri;
}
