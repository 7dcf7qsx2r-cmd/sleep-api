# xmianai.com / www.xmianai.com — 官网静态站
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name xmianai.com www.xmianai.com;

    ssl_certificate /etc/letsencrypt/live/xmianai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xmianai.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/xiaomian;
    index index.html;

    location = /app {
        return 301 /app/;
    }

    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.apk$ {
        add_header Content-Disposition "attachment";
        default_type application/vnd.android.package-archive;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name xmianai.com www.xmianai.com;
    return 301 https://$host$request_uri;
}
