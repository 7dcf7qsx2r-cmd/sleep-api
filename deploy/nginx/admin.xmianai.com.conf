# admin.xmianai.com — 小眠运营后台（静态 SPA，API 走 api.xmianai.com）
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name admin.xmianai.com;

    ssl_certificate /etc/letsencrypt/live/xmianai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xmianai.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/xiaomian-admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.xmianai.com;
    return 301 https://$host$request_uri;
}
